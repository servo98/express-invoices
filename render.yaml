databases:
  - name: express-invoices-db
    plan: free
    databaseName: express_invoices
    user: express_invoices_user

services:
  - type: web
    plan: free
    name: express-invoices
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npx next start -H 0.0.0.0 -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: express-invoices-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_DISCORD_ID
        sync: false
      - key: AUTH_DISCORD_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        value: "https://express-invoices.onrender.com"
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: CRON_SECRET
        generateValue: true
